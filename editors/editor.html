      --ed-me-green:#3d7a34; --ed-me-strong:#1f242b; --ed-me-strong2:#1b1f24;
      /* keyframe timeline — light cool slate */
      --ed-kf-bg:#e9edf2; --ed-kf-field-bg:#f4f6fa; --ed-kf-row:#f1f4f8; --ed-kf-row-part:#eaeef4; --ed-kf-row-sel:#dbe3f0;
      --ed-kf-grid:#c4ccd6; --ed-kf-border:#c2ccd8; --ed-kf-border-dim:#d5dce6;
      --ed-kf-text:#54606e; --ed-kf-text-strong:#1b232c; --ed-kf-text-dim:#6a7688; --ed-kf-text-faint:#8a94a6; --ed-kf-text-empty:#7a8698;
      --ed-kf-input-fg:#1b232c; --ed-kf-btn-hover:#9fb0c4; --ed-kf-nokeys:#8a9bb0;
      --ed-kf-key-sel:#2563c4; --ed-kf-key-hi:#1b232c; --ed-kf-key-stroke:#17418a; --ed-kf-key2:#6f9fe0; --ed-kf-key2-stroke:#3f6fb8;
      --ed-kf-playhead:#c23a20; --ed-kf-scroll-track:#c4ccd6; --ed-kf-scroll-thumb:#a6b0bd; --ed-kf-armed:#c23a20;
      /* piano roll — light cool / neutral grayscale, blue notes */
      --ed-pr-bg:#f4f5f7; --ed-pr-mini-bg:#e9ecf1; --ed-pr-label:#6b7683; --ed-pr-ghost:#cfd5de; --ed-pr-note-density:#9aa4b0;
      --ed-pr-row-black:#e7eaef; --ed-pr-row-white:#f4f5f7; --ed-pr-line:#dbe0e7;
      --ed-pr-note-sel:#2563c4; --ed-pr-note-stroke:#16437f; --ed-pr-barnum:#5f6b78;
      --ed-pr-gutter-bg:#eef1f5; --ed-pr-keylabel-bg:#e4e8ee; --ed-pr-keylabel:#54606e; --ed-pr-playhead:#c23a20;
    }

    /* ─── Reset & Base ─────────────────────────────────────────── */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--ed-bg-app);
      color: var(--ed-accent);
      font-family: 'Courier New', monospace;
      overflow: hidden;
      min-width: 1024px;
    }

    /* ─── Editor Container ─────────────────────────────────────── */
    .editor-container {
      display: flex;
      flex-direction: column;
      height: 100vh;
      width: 100vw;
    }

    /* ─── Header ───────────────────────────────────────────────── */
    .editor-header {
      display: flex;
      align-items: center;
      padding: 8px 16px;
      background: rgba(var(--ed-panel-rgb),0.95);
      border-bottom: 1px solid var(--ed-border);
      flex-shrink: 0;
    }
    .editor-title {
      font-size: 16px;
      font-weight: bold;
      color: var(--ed-accent);
      text-shadow: 0 0 12px rgba(var(--ed-accent-rgb),0.3);
      letter-spacing: 2px;
      margin-right: auto;
    }
    .editor-save-hint {
      font-size: 11px;
      color: var(--ed-muted);
    }
    .editor-theme-picker {
      margin-left: 12px;
      font-family: 'Courier New', monospace;
      font-size: 11px;
      color: var(--ed-accent);
      background: rgba(var(--ed-input-rgb),0.8);
      border: 1px solid var(--ed-border);
      border-radius: 3px;
      padding: 3px 6px;
      cursor: pointer;
    }
    .editor-theme-picker:focus { outline: none; border-color: var(--ed-accent); }
    .editor-theme-picker option { background: var(--ed-bg-app); color: var(--ed-accent); }

    /* ─── Tab Bar ──────────────────────────────────────────────── */
    .tab-bar {
      display: flex;
      background: rgba(var(--ed-panel-rgb),0.92);
      border-bottom: 2px solid var(--ed-border);
      flex-shrink: 0;
    }
    .tab-bar .tab {
      padding: 8px 20px;
      font-family: 'Courier New', monospace;
      font-size: 13px;
      color: var(--ed-muted);
      background: transparent;
      border: none;
      border-bottom: 2px solid transparent;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
      position: relative;
    }
    .tab-bar .tab:hover {
      color: var(--ed-accent);
    }
    .tab-bar .tab.active {
      color: var(--ed-accent);
      border-bottom-color: var(--ed-accent);
    }
    .tab-bar .tab .unsaved-dot {
      display: none;
      color: var(--ed-danger);
      margin-left: 4px;
    }
    .tab-bar .tab .unsaved-dot.visible {
      display: inline;
    }

    /* ─── Sub-tabs (Soundboard hosts Sounds + Music) ───────────── */
    #tab-soundboard.active { flex-direction: column; overflow: hidden; }
    .subtab-bar {
      display: flex;
      gap: 4px;
      flex-shrink: 0;
      padding: 6px 10px 0;
      background: rgba(var(--ed-panel-rgb),0.6);
      border-bottom: 1px solid var(--ed-border-warm2);
    }
    .subtab-bar .subtab {
      padding: 5px 16px;
      font-family: 'Courier New', monospace;
      font-size: 12px;
      color: var(--ed-muted);
      background: transparent;
      border: 1px solid transparent;
      border-bottom: none;
      border-radius: 4px 4px 0 0;
      cursor: pointer;
      transition: color 0.15s, background 0.15s;
    }
    .subtab-bar .subtab:hover { color: var(--ed-accent); }
    .subtab-bar .subtab.active {
      color: var(--ed-accent);
      background: rgba(var(--ed-input-rgb),0.85);
      border-color: var(--ed-faint);
    }
    .subtab-bar .subtab .unsaved-dot { display: none; color: var(--ed-danger); margin-left: 4px; }
    .subtab-bar .subtab .unsaved-dot.visible { display: inline; }
    .subtab-panels { flex: 1; position: relative; overflow: hidden; }
    .subtab-content {
      display: none;
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      overflow: auto;
    }
    .subtab-content.active { display: flex; }

    /* ─── Tab Panels ───────────────────────────────────────────── */
    .tab-panels {
      flex: 1;
      overflow: hidden;
      position: relative;
    }
    .tab-content {
      display: none;
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      overflow: auto;
    }
    .tab-content.active {
      display: flex;
    }

    /* ─── Shared Editor Layout Classes ─────────────────────────── */
    .editor-body {
      display: flex;
      flex: 1;
      overflow: hidden;
      height: 100%;
      width: 100%;
    }
    .editor-sidebar {
      width: 220px;
      min-width: 180px;
      max-width: 300px;
      background: rgba(var(--ed-panel-rgb),0.92);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      flex-shrink: 0;
    }
    .editor-main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      padding: 12px;
      gap: 12px;
    }
    .editor-preview {
      flex-shrink: 0;
      position: relative;
    }
    .editor-props {
      flex: 1;
      overflow-y: auto;
    }

    /* ─── Widget Styles ────────────────────────────────────────── */
    .editor-widget {
      margin-bottom: 6px;
    }
    .editor-label {
      display: block;
      font-size: 11px;
      color: var(--ed-muted);
      margin-bottom: 2px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .editor-row {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .editor-slider {
      flex: 1;
      accent-color: var(--ed-accent);
      height: 4px;
    }
    .editor-num-input {
      width: 70px;
      padding: 3px 6px;
      font-family: 'Courier New', monospace;
      font-size: 12px;
      color: var(--ed-accent);
      background: rgba(var(--ed-input-rgb),0.8);
      border: 1px solid var(--ed-border);
      border-radius: 3px;
    }
    .editor-num-input:focus {
      border-color: var(--ed-accent);
      outline: none;
    }
    .editor-text-field {
      width: 100%;
      padding: 4px 8px;
      font-family: 'Courier New', monospace;
      font-size: 12px;
      color: var(--ed-accent);
      background: rgba(var(--ed-input-rgb),0.8);
      border: 1px solid var(--ed-border);
      border-radius: 3px;
    }
    .editor-text-field:focus {
      border-color: var(--ed-accent);
      outline: none;
    }
    .editor-select-input {
      width: 100%;
      padding: 4px 8px;
      font-family: 'Courier New', monospace;
      font-size: 12px;
      color: var(--ed-accent);
      background: rgba(var(--ed-input-rgb),0.8);
      border: 1px solid var(--ed-border);
      border-radius: 3px;
    }
    .editor-select-input:focus {
      border-color: var(--ed-accent);
      outline: none;
    }
    .editor-color-text {
      width: 90px;
    }
    .editor-color-picker {
      width: 28px;
      height: 28px;
      padding: 0;
      border: 1px solid var(--ed-border);
      border-radius: 3px;
      cursor: pointer;
      background: transparent;
    }
    .editor-range-toggle {
      font-size: 10px;
      padding: 2px 4px;
      min-width: 24px;
    }
    .editor-range-sep {
      color: var(--ed-muted);
      font-size: 12px;
    }

    /* ─── Buttons ──────────────────────────────────────────────── */
    .editor-btn {
      padding: 4px 10px;
      font-family: 'Courier New', monospace;
      font-size: 12px;
      border: 1px solid var(--ed-border);
      border-radius: 3px;
      cursor: pointer;
      background: transparent;
      transition: background 0.1s, border-color 0.1s;
    }
    .editor-btn-primary {
      color: var(--ed-accent);
      border-color: var(--ed-accent);
    }
    .editor-btn-primary:hover {
      background: rgba(var(--ed-accent-rgb),0.15);
    }
    .editor-btn-danger {
      color: var(--ed-danger);
      border-color: var(--ed-danger);
    }
    .editor-btn-danger:hover {
      background: rgba(var(--ed-danger-rgb),0.15);
    }
    .editor-btn-subtle {
      color: var(--ed-muted);
      border-color: var(--ed-faint);
    }
    .editor-btn-subtle:hover {
      color: var(--ed-accent);
      border-color: var(--ed-accent);
    }
    .editor-toggle-btn {
      min-width: 40px;
      text-align: center;
    }

    /* ─── Property Group ───────────────────────────────────────── */
    .editor-prop-group {
      border: 1px solid var(--ed-border);
      border-radius: 4px;
      margin-bottom: 8px;
      overflow: hidden;
    }
    .editor-prop-group-header {
      padding: 6px 10px;
      font-size: 12px;
      font-weight: bold;
      color: var(--ed-accent);
      background: rgba(var(--ed-border-rgb),0.2);
      cursor: pointer;
      user-select: none;
      border-bottom: 1px solid var(--ed-border);
    }
    .editor-prop-group-header::before {
      content: '▾ ';
    }
    .editor-prop-group-header.collapsed::before {
      content: '▸ ';
    }
    .editor-prop-group-body {
      padding: 8px 10px;
    }

    /* ─── List Editor ──────────────────────────────────────────── */
    .editor-list-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 4px;
    }
    .editor-list-item {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 3px 0;
      border-bottom: 1px solid rgba(var(--ed-border-rgb),0.2);
    }
    .editor-list-item:last-child {
      border-bottom: none;
    }
    .editor-list-remove {
      font-size: 14px;
      padding: 1px 5px;
      flex-shrink: 0;
    }

    /* ─── Tree View ────────────────────────────────────────────── */
    .editor-tree-node {
      padding: 2px 6px;
      font-size: 12px;
      cursor: pointer;
      border-radius: 3px;
    }
    .editor-tree-node:hover {
      background: rgba(var(--ed-accent-rgb),0.08);
    }
    .editor-tree-node.selected {
      background: rgba(var(--ed-accent-rgb),0.15);
      color: var(--ed-accent);
    }

    /* ─── Preview Canvas ───────────────────────────────────────── */
    .editor-preview-canvas {
      border: 1px solid var(--ed-border);
      border-radius: 4px;
      display: block;
    }

    /* ─── Sidebar Items ────────────────────────────────────────── */
    .editor-sidebar-search {
      padding: 8px;
      border-bottom: 1px solid var(--ed-border);
    }
    .editor-sidebar-search input {
      width: 100%;
      padding: 4px 8px;
      font-family: 'Courier New', monospace;
      font-size: 12px;
      color: var(--ed-accent);
      background: rgba(var(--ed-input-rgb),0.8);
      border: 1px solid var(--ed-border);
      border-radius: 3px;
    }
    .editor-sidebar-search input::placeholder {
      color: var(--ed-faint);
    }
    .editor-sidebar-search input:focus {
      border-color: var(--ed-accent);
      outline: none;
    }
    .editor-sidebar-actions {
      padding: 6px 8px;
      display: flex;
      gap: 4px;
      border-bottom: 1px solid var(--ed-border);
    }
    .editor-sidebar-list {
      flex: 1;
      overflow-y: auto;
      padding: 4px 0;
    }
    .editor-sidebar-category {
      margin-bottom: 2px;
    }
    .editor-sidebar-category-header {
      padding: 4px 10px;
      font-size: 12px;
      color: var(--ed-muted);
      cursor: pointer;
      user-select: none;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .editor-sidebar-category-header:hover {
      color: var(--ed-accent);
    }
    .editor-sidebar-category-header .count {
      font-size: 10px;
      color: var(--ed-faint);
    }
    .editor-sidebar-item {
      padding: 3px 10px 3px 22px;
      font-size: 12px;
      color: var(--ed-muted);
      cursor: pointer;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .editor-sidebar-item:hover {
      color: var(--ed-accent);
      background: rgba(var(--ed-accent-rgb),0.06);
    }
    .editor-sidebar-item.selected {
      color: var(--ed-accent);
      background: rgba(var(--ed-accent-rgb),0.12);
    }
    .editor-sidebar-footer {
      padding: 8px;
      border-top: 1px solid var(--ed-border);
    }

    /* ─── Save Status ──────────────────────────────────────────── */
    .editor-save-status {
      font-size: 12px;
      margin-right: 8px;
    }

    /* ─── Three-Column Layout ────────────────────────────────────── */
    .editor-three-col {
      display: flex;
      flex: 1;
      min-height: 0;
      overflow: hidden;
    }
    .editor-right-panel {
      width: 320px;
      min-width: 260px;
      overflow-y: auto;
      padding: 8px 12px;
      flex-shrink: 0;
    }
    .editor-center {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
      overflow: hidden;
    }

    /* ─── State Bar ──────────────────────────────────────────────── */
    .art-state-bar {
      display: flex;
      gap: 3px;
      padding: 6px 8px;
      border-bottom: 1px solid var(--ed-border-subtle);
      flex-shrink: 0;
      flex-wrap: wrap;
      align-items: center;
    }
    .state-tab {
      padding: 3px 8px;
      font-family: 'Courier New', monospace;
      font-size: 11px;
      border: 1px solid var(--ed-border);
      border-radius: 3px;
      background: transparent;
      color: var(--ed-muted);
      cursor: pointer;
      transition: color 0.1s, border-color 0.1s, background 0.1s;
    }
    .state-tab:hover { color: var(--ed-accent); border-color: var(--ed-accent); }
    .state-tab.active { color: var(--ed-info); border-color: var(--ed-info); background: rgba(var(--ed-info-rgb),0.08); }
    .state-tab.base { color: var(--ed-muted); }
    .state-tab.base.active { color: var(--ed-accent); border-color: var(--ed-accent); background: rgba(var(--ed-accent-rgb),0.1); }
    .state-tab .badge { font-size: 9px; color: var(--ed-faint); margin-left: 2px; }
    .state-tab-add {
      padding: 3px 8px;
      font-family: 'Courier New', monospace;
      font-size: 11px;
      border: 1px dashed var(--ed-border);
      border-radius: 3px;
      background: transparent;
      color: var(--ed-faint);
      cursor: pointer;
    }
    .state-tab-add:hover { color: var(--ed-muted); border-color: var(--ed-muted); }

    /* ─── Shape Tree ─────────────────────────────────────────────── */
    .shape-tree-search {
      padding: 6px 8px;
      border-bottom: 1px solid var(--ed-border-subtle);
    }
    .shape-tree-search input {
      width: 100%;
      padding: 3px 6px;
      font-family: 'Courier New', monospace;
      font-size: 11px;
      color: var(--ed-accent);
      background: rgba(var(--ed-input-rgb),0.8);
      border: 1px solid var(--ed-border);
      border-radius: 3px;
    }
    .shape-tree-search input::placeholder { color: var(--ed-faint); }
    .shape-tree-search input:focus { border-color: var(--ed-accent); outline: none; }
    .shape-tree-toolbar {
      display: flex;
      gap: 2px;
      padding: 4px 6px;
      border-bottom: 1px solid var(--ed-border-subtle);
      flex-wrap: wrap;
    }
    .shape-tree-toolbar .editor-btn { padding: 2px 6px; font-size: 10px; }
    .shape-tree-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 2px 0;
    }
    .shape-tree-node {
      display: flex;
      align-items: center;
      padding: 2px 4px;
      cursor: pointer;
      border-radius: 3px;
      font-size: 11px;
      color: var(--ed-muted2);
      gap: 2px;
    }
    .shape-tree-node:hover { background: rgba(var(--ed-info-rgb),0.06); color: var(--ed-muted4); }
    .shape-tree-node.selected { background: rgba(var(--ed-accent-rgb),0.15); color: var(--ed-accent); }
    .shape-tree-node .tree-expand {
      width: 14px;
      text-align: center;
      font-size: 10px;
      color: var(--ed-faint);
      cursor: pointer;
      flex-shrink: 0;
    }
    .shape-tree-node .tree-expand:hover { color: var(--ed-accent); }
    .shape-tree-node .tree-icon {
      width: 18px;
      text-align: center;
      font-size: 10px;
      opacity: 0.6;
      flex-shrink: 0;
    }
    .shape-tree-node .tree-name {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .shape-tree-node .state-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      display: inline-block;
      margin-left: 2px;
      flex-shrink: 0;
    }
    .state-dot.override { background: var(--ed-info); }
    .state-dot.active-state { background: var(--ed-accent); }
    .shape-tree-node.drag-source { opacity: 0.4; }

    /* ─── Coord Editor ───────────────────────────────────────────── */
    .coord-editor { margin-bottom: 6px; }
    .coord-editor-label {
      font-size: 11px;
      color: var(--ed-muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 2px;
    }
    .coord-component {
      display: flex;
      align-items: center;
      gap: 4px;
      margin: 2px 0;
    }
    .coord-component .comp-key {
      font-size: 10px;
      color: var(--ed-info);
      width: 40px;
      text-align: right;
      font-weight: bold;
      flex-shrink: 0;
    }
    .coord-component .comp-del {
      background: none;
      border: none;
      color: var(--ed-remove);
      cursor: pointer;
      font-size: 10px;
      padding: 0 2px;
      flex-shrink: 0;
    }
    .coord-component .comp-del:hover { color: var(--ed-remove-hover); }

    /* ─── Override Indicators ────────────────────────────────────── */
    .prop-override { border-left: 2px solid var(--ed-info); padding-left: 6px; margin: 4px 0; }
    .prop-base-dimmed { opacity: 0.6; }
    .override-label { font-size: 10px; color: var(--ed-info); font-weight: bold; }
    .override-remove {
      background: none;
      border: none;
      color: var(--ed-remove);
      cursor: pointer;
      font-size: 11px;
      padding: 0 3px;
    }
    .override-remove:hover { color: var(--ed-remove-hover); }
    .add-override-btn {
      font-size: 10px;
      color: var(--ed-faint);
      cursor: pointer;
      background: none;
      border: none;
      font-family: 'Courier New', monospace;
      opacity: 0;
      transition: opacity 0.15s;
    }
    .editor-widget:hover .add-override-btn { opacity: 1; }
    .add-override-btn:hover { color: var(--ed-info); }

    /* ─── Properties Header ──────────────────────────────────────── */
    .props-header {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 0;
      border-bottom: 1px solid var(--ed-border-subtle);
      margin-bottom: 8px;
    }
    .props-header .shape-type-icon {
      font-size: 12px;
      color: var(--ed-muted);
      width: 20px;
      text-align: center;
    }
    .props-header .shape-name {
      font-size: 13px;
      font-weight: bold;
      color: var(--ed-accent);
      flex: 1;
    }
    .props-header .shape-type-label {
      font-size: 10px;
      color: var(--ed-faint);
    }

    /* ─── Tag List ───────────────────────────────────────────────── */
    .tag-list { display: flex; flex-wrap: wrap; gap: 4px; align-items: center; }
    .tag-chip {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      padding: 2px 6px;
      font-family: 'Courier New', monospace;
      font-size: 10px;
      color: var(--ed-info);
      border: 1px solid var(--ed-info);
      border-radius: 3px;
      background: rgba(var(--ed-info-rgb),0.06);
    }
    .tag-chip .tag-remove {
      cursor: pointer;
      color: var(--ed-remove);
      font-size: 11px;
    }
    .tag-chip .tag-remove:hover { color: var(--ed-remove-hover); }
    .tag-add-btn {
      padding: 2px 6px;
      font-family: 'Courier New', monospace;
      font-size: 10px;
      color: var(--ed-faint);
      border: 1px dashed var(--ed-border);
      border-radius: 3px;
      background: transparent;
      cursor: pointer;
    }
    .tag-add-btn:hover { color: var(--ed-muted); border-color: var(--ed-muted); }

    /* ─── Context Menu ───────────────────────────────────────────── */
    .editor-context-menu {
      position: fixed;
      background: var(--ed-menu-bg);
      border: 1px solid var(--ed-border);
      border-radius: 4px;
      padding: 4px 0;
      z-index: 1000;
      min-width: 140px;
    }
    .editor-context-menu-item {
      padding: 4px 12px;
      font-family: 'Courier New', monospace;
      font-size: 11px;
      color: var(--ed-accent);
      cursor: pointer;
    }
    .editor-context-menu-item:hover { background: rgba(var(--ed-accent-rgb),0.15); }
    .editor-context-menu-item.danger { color: var(--ed-danger); }
    .editor-context-menu-item.danger:hover { background: rgba(var(--ed-danger-rgb),0.15); }
    .editor-context-menu-sep {
      height: 1px;
      background: var(--ed-border);
      margin: 3px 0;
    }

    /* ─── Resizer Handles ──────────────────────────────────────── */
    .editor-resizer {
      flex-shrink: 0;
      background: transparent;
      position: relative;
      z-index: 10;
    }
    .editor-resizer::after {
      content: '';
      position: absolute;
      background: var(--ed-border);
      transition: background 0.15s;
    }
    .editor-resizer:hover::after,
    .editor-resizer.active::after {
      background: var(--ed-accent);
    }
    .editor-resizer-horizontal {
      width: 5px;
      cursor: col-resize;
    }
    .editor-resizer-horizontal::after {
      top: 0;
      bottom: 0;
      left: 2px;
      width: 1px;
    }
    .editor-resizer-vertical {
      height: 5px;
      cursor: row-resize;
    }
    .editor-resizer-vertical::after {
      left: 0;
      right: 0;
      top: 2px;
      height: 1px;
    }

    /* ─── Scrollbar Styling ────────────────────────────────────── */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    /* (thumb/track tokenized below) */
    ::-webkit-scrollbar-track { background: rgba(var(--ed-panel-rgb),0.5); }
    ::-webkit-scrollbar-thumb { background: var(--ed-scroll); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--ed-scroll-hover); }
  </style>
</head>
<body>
  <div class="editor-container">
    <div class="editor-header">
      <span class="editor-title">PAT_ENGINE EDITOR SUITE</span>
      <span class="editor-save-hint">Ctrl+S: Save Current</span>
    </div>
    <div class="tab-bar">
      <button class="tab active" data-tab="art">Art<span class="unsaved-dot">&#8226;</span></button>
      <button class="tab" data-tab="vfx">VFX<span class="unsaved-dot">&#8226;</span></button>
      <button class="tab" data-tab="sequences">Sequences<span class="unsaved-dot">&#8226;</span></button>
      <button class="tab" data-tab="soundboard">Soundboard<span class="unsaved-dot">&#8226;</span></button>
    </div>
    <div class="tab-panels">
      <div class="tab-content active" id="tab-art"></div>
      <div class="tab-content" id="tab-vfx"></div>
      <div class="tab-content" id="tab-sequences"></div>
      <div class="tab-content" id="tab-soundboard">
        <div class="subtab-bar">
          <button class="subtab active" data-subtab="sounds">Sounds<span class="unsaved-dot">&#8226;</span></button>
          <button class="subtab" data-subtab="music">Music<span class="unsaved-dot">&#8226;</span></button>
        </div>
        <div class="subtab-panels">
          <div class="subtab-content active" id="subtab-sounds"></div>
          <div class="subtab-content" id="subtab-music"></div>
        </div>
      </div>
    </div>
  </div>

  <script type="module">
    import { initThemePicker } from '/editors/shared/theme.js';
    initThemePicker(document.querySelector('.editor-header'));

    // Top-level tabs. Soundboard hosts two sub-tabs: Sounds + Music.
    const TAB_IDS = ['art', 'vfx', 'sequences', 'soundboard'];
    const SUB_EDITOR = { sounds: 'soundboard', music: 'music' }; // sub-tab id → editor id
    const PANEL_OF = {                                           // editor id → mount panel id
      art: 'tab-art', vfx: 'tab-vfx', sequences: 'tab-sequences',
      soundboard: 'subtab-sounds', music: 'subtab-music',
    };
    const ENTRY_OF = {                                          // editor id → module path
      art: '/editors/art/artEditor.js',                        // relocated into art/
      vfx: '/editors/vfx/vfxEditor.js',                        // relocated into vfx/
      sequences: '/editors/sequences/sequencesEditor.js',      // relocated into sequences/
      soundboard: '/editors/soundboard/soundboardEditor.js',   // relocated into soundboard/
      music: '/editors/music/musicEditor.js',                  // relocated into music/
    };

    const editors = {};
    for (const id of Object.keys(PANEL_OF)) editors[id] = { module: null, mounted: false };
    const dirtyState = {};

    let activeTab = null;
    let activeSubtab = 'sounds';

    // ── Lazy-load + mount an editor module into its panel ─────────
    async function mountEditor(editorId) {
      if (editors[editorId].mounted) return;
      try {
        const mod = await import(ENTRY_OF[editorId]);
        await mod.mount(document.getElementById(PANEL_OF[editorId]));
        editors[editorId] = { module: mod, mounted: true };
      } catch (err) {
        console.error(`Failed to load ${editorId} editor:`, err);
        const panel = document.getElementById(PANEL_OF[editorId]);
        panel.innerHTML = `<div style="padding:40px;color:var(--ed-danger)">Failed to load ${editorId} editor: ${err.message}</div>`;
      }
    }

    // ── Top-level tab switching ──────────────────────────────────
    async function activateTab(tabId) {
      if (activeTab === tabId) return;

      document.querySelectorAll('.tab-bar .tab').forEach(btn =>
        btn.classList.toggle('active', btn.dataset.tab === tabId));

      // Explicitly manage display so editor inline styles can't override display:none
      document.querySelectorAll('.tab-content').forEach(panel => {
        const isActive = panel.id === `tab-${tabId}`;
        panel.classList.toggle('active', isActive);
        if (!isActive) panel.style.display = 'none'; else panel.style.removeProperty('display');
      });

      activeTab = tabId;
      if (tabId === 'soundboard') {
        await activateSubtab(activeSubtab); // mounts the current sub-editor + sets the hash
      } else {
        location.hash = tabId;
        await mountEditor(tabId);
      }
    }

    // ── Soundboard sub-tab switching (Sounds | Music) ────────────
    async function activateSubtab(subId) {
      activeSubtab = subId;
      document.querySelectorAll('.subtab-bar .subtab').forEach(btn =>
        btn.classList.toggle('active', btn.dataset.subtab === subId));
      document.querySelectorAll('.subtab-content').forEach(panel => {
        const isActive = panel.id === `subtab-${subId}`;
        panel.classList.toggle('active', isActive);
        if (!isActive) panel.style.display = 'none'; else panel.style.removeProperty('display');
      });
      location.hash = subId === 'sounds' ? 'soundboard' : 'music';
      await mountEditor(SUB_EDITOR[subId]);
    }

    // The editor whose save()/isDirty() Ctrl+S targets right now.
    function currentEditorId() {
      return activeTab === 'soundboard' ? SUB_EDITOR[activeSubtab] : activeTab;
    }

    // ── Tab + sub-tab click handlers ─────────────────────────────
    document.querySelectorAll('.tab-bar .tab').forEach(btn =>
      btn.addEventListener('click', () => activateTab(btn.dataset.tab)));
    document.querySelectorAll('.subtab-bar .subtab').forEach(btn =>
      btn.addEventListener('click', () => activateSubtab(btn.dataset.subtab)));

    // ── Keyboard shortcuts ───────────────────────────────────────
    document.addEventListener('keydown', (e) => {
      if (e.ctrlKey || e.metaKey) {
        if (e.key === 's' || e.key === 'S') {
          e.preventDefault();
          const ed = editors[currentEditorId()];
          if (ed && ed.module && ed.module.save) ed.module.save();
        }
        const tabIndex = parseInt(e.key) - 1;
        if (tabIndex >= 0 && tabIndex < TAB_IDS.length) {
          e.preventDefault();
          activateTab(TAB_IDS[tabIndex]);
        }
      }
    });

    // ── Unsaved changes guard ────────────────────────────────────
    window.addEventListener('beforeunload', (e) => {
      const hasUnsaved = Object.values(editors).some(x =>
        x.module && x.module.isDirty && x.module.isDirty());
      if (hasUnsaved) { e.preventDefault(); e.returnValue = ''; }
    });

    // ── Unsaved dot API — editors call editorSetUnsaved(id, dirty) ─
    // The Sounds + Music sub-editors each light their own sub-tab dot and roll up
    // into the Soundboard top-level dot.
    window.editorSetUnsaved = (editorId, dirty) => {
      dirtyState[editorId] = dirty;
      if (editorId === 'soundboard' || editorId === 'music') {
        const subId = editorId === 'soundboard' ? 'sounds' : 'music';
        const subDot = document.querySelector(`.subtab[data-subtab="${subId}"] .unsaved-dot`);
        if (subDot) subDot.classList.toggle('visible', dirty);
        const topDot = document.querySelector('.tab[data-tab="soundboard"] .unsaved-dot');
        if (topDot) topDot.classList.toggle('visible', !!(dirtyState.soundboard || dirtyState.music));
      } else {
        const dot = document.querySelector(`.tab[data-tab="${editorId}"] .unsaved-dot`);
        if (dot) dot.classList.toggle('visible', dirty);
      }
    };

    // ── URL hash routing (supports the legacy #music deep link) ──
    const initial = location.hash.slice(1);
    if (initial === 'music') { activeSubtab = 'music'; activateTab('soundboard'); }
    else if (TAB_IDS.includes(initial)) activateTab(initial);
    else activateTab('art');
  </script>
</body>
</html>
