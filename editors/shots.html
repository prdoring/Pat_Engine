<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pat_Engine — Shots</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0b1118; color: #9fb3c8; font-family: 'Courier New', monospace; padding: 16px; }
    #bar { margin-bottom: 14px; font-size: 13px; line-height: 1.8; }
    #bar a { color: #7cc6a0; text-decoration: none; margin-right: 12px; }
    #bar a:hover { text-decoration: underline; }
    #bar .muted { color: #5a6b7d; }
    #stage canvas { display: block; image-rendering: auto; box-shadow: 0 2px 12px #0006; }
    .cell { margin-bottom: 18px; }
    .cell .cap { font-size: 12px; color: #7cc6a0; margin: 4px 0 6px; }
    #err { color: #e88a8a; white-space: pre-wrap; font-size: 12px; }
  </style>
</head>
<body>
  <div id="bar">Loading shots…</div>
  <div id="stage"></div>
  <div id="err"></div>

  <!--
    Generic, game-agnostic shot viewer. It reads data/shots.json, dynamically imports the
    game's renderShot seam from the data-declared `render` path (so this page hardcodes no
    game module), renders each declared state to a real canvas, and shows a contact sheet
    (default) or one full-res shot (?shot=<id>). The browser is the fidelity backend.
  -->
  <script type="module">
    import { runShots } from '/engine/harness/runShots.js';
    import { composeContactSheet } from '/engine/harness/contactSheet.js';

    const bar = document.getElementById('bar');
    const stage = document.getElementById('stage');
    const errEl = document.getElementById('err');

    const makeCanvas = (w, h) => {
      const c = document.createElement('canvas');
      c.width = w; c.height = h;
      return c;
    };
    const showCanvas = (canvas, logicalW, label) => {
      const cell = document.createElement('div');
      cell.className = 'cell';
      if (label) { const cap = document.createElement('div'); cap.className = 'cap'; cap.textContent = label; cell.appendChild(cap); }
      if (logicalW) canvas.style.width = logicalW + 'px'; // display at logical size (backing is dpr-scaled)
      cell.appendChild(canvas);
      stage.appendChild(cell);
    };

    try {
      const manifest = await (await fetch('/data/shots.json', { cache: 'no-store' })).json();
      const { renderShot } = await import(manifest.render); // data-declared → engine never names game/
      if (document.fonts && document.fonts.ready) await document.fonts.ready; // reproducible text

      const params = new URLSearchParams(location.search);
      const only = params.get('shot');
      const scale = parseFloat(params.get('scale') || '') || undefined; // dpr override for full-res
      const defaults = scale ? { dpr: scale } : {};

      // Programmatic hook for headless drivers (gstack browse / Playwright).
      window.__shots = {
        ids: manifest.shots.map((s) => s.id),
        render(id) {
          const shot = manifest.shots.find((s) => s.id === id);
          if (!shot) return null;
          return runShots({ shots: [shot], renderShot, makeCanvas, defaults })[0].canvas;
        },
      };

      const link = (id) => `<a href="?shot=${encodeURIComponent(id)}">${id}</a>`;
      const allHref = '<a href="?">contact sheet</a>';

      if (only) {
        const shot = manifest.shots.find((s) => s.id === only);
        if (!shot) throw new Error(`unknown shot "${only}" — have: ${manifest.shots.map((s) => s.id).join(', ')}`);
        bar.innerHTML = `${allHref} <span class="muted">|</span> ${manifest.shots.map((s) => link(s.id)).join('')}`;
        const r = runShots({ shots: [shot], renderShot, makeCanvas, defaults })[0];
        showCanvas(r.canvas, r.width, only);
        window.__shotsReady = true;
      } else {
        bar.innerHTML = `<b style="color:#cfe3d6">${manifest.shots.length} shots</b> <span class="muted">|</span> ${manifest.shots.map((s) => link(s.id)).join('')}`;
        const results = runShots({ shots: manifest.shots, renderShot, makeCanvas, defaults });
        const sheet = composeContactSheet(results, { makeCanvas, cols: Math.min(3, results.length) });
        showCanvas(sheet, sheet.width / (window.devicePixelRatio || 1), 'contact sheet');
        window.__shotsReady = true;
      }
    } catch (e) {
      bar.textContent = 'Shots failed to render.';
      errEl.textContent = (e && e.stack) || String(e);
      console.error('[shots]', e);
    }
  </script>
</body>
</html>
