name: tests

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npm test
      # Boots every page in headless Chrome (preinstalled on the runner) and
      # fails on any console error. Skips gracefully if no browser is found.
      - run: npm run smoke
